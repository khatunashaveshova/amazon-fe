<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Visible GSAP Scroll Animation</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body class="bg-gray-100">

  <!-- Big top space so scrolling is obvious -->
  <section class="h-screen flex items-center justify-center">
    <h1 class="text-5xl font-bold text-gray-700">
      Scroll Down ↓
    </h1>
  </section>

  <!-- Cards Section -->
  <section class="py-24 px-6">
    <div class="max-w-6xl mx-auto">

      <div class="text-center mb-16">
        <p class="text-cyan-500 font-bold uppercase tracking-[4px] mb-4">
          LESSONS
        </p>

        <h2 class="text-4xl font-bold text-gray-800">
          JavaScript Topics
        </h2>
      </div>

      <div
        id="cardsSection"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      >

        <!-- Card 1 -->
        <div class="lesson-card bg-white rounded-2xl shadow-xl p-8 border border-gray-200">
          <div class="text-4xl mb-4">⚡</div>
          <h3 class="text-2xl font-bold mb-4">Promises</h3>
          <p class="text-gray-600 leading-7">
            Promise represents a future result in JavaScript.
          </p>
        </div>

        <!-- Card 2 -->
        <div class="lesson-card bg-white rounded-2xl shadow-xl p-8 border border-gray-200">
          <div class="text-4xl mb-4">🌐</div>
          <h3 class="text-2xl font-bold mb-4">Fetch API</h3>
          <p class="text-gray-600 leading-7">
            Fetch API is used to load data from servers.
          </p>
        </div>

        <!-- Card 3 -->
        <div class="lesson-card bg-white rounded-2xl shadow-xl p-8 border border-gray-200">
          <div class="text-4xl mb-4">🚀</div>
          <h3 class="text-2xl font-bold mb-4">Async / Await</h3>
          <p class="text-gray-600 leading-7">
            Async/Await makes asynchronous code easier to read.
          </p>
        </div>

      </div>
    </div>
  </section>

  <script>
    // Register ScrollTrigger
    gsap.registerPlugin(ScrollTrigger);

    /*
      VERY VISIBLE animation:
      - starts from x: -200
      - opacity: 0
      - scale: 0.7
      - rotate: 10deg

      This makes the animation clearly visible
    */

    gsap.from(".lesson-card", {
      x: -200,
      opacity: 0,
      scale: 0.7,
      rotation: 10,
      duration: 1.2,
      stagger: 0.3,
      ease: "back.out(1.7)",

      scrollTrigger: {
        trigger: "#cardsSection",
        start: "top 85%",
        markers: true, // IMPORTANT: shows markers so you SEE trigger points
        toggleActions: "play none none none",
        once: true
      }
    });
  </script>

</body>
</html>
